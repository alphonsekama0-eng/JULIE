{% extends "base.html" %}
{% set title = "Formulaire - Recensement" %}

{% block content %}
  <section class="card">
    <h1 class="h1">Formulaire d'inscription</h1>
    <p class="muted">Remplis les informations puis clique sur “Enregistrer”.</p>

    <form class="form" method="post" action="{{ url_for('inscrire') }}">
      <div class="grid">
        <div class="field">
          <label for="prenom">Prénom *</label>
          <input id="prenom" name="prenom" required value="{{ (form.get('prenom') if form else '') | e }}" />
        </div>
        <div class="field">
          <label for="nom">Nom *</label>
          <input id="nom" name="nom" required value="{{ (form.get('nom') if form else '') | e }}" />
        </div>

        <div class="field">
          <label for="age">Âge</label>
          <input id="age" name="age" inputmode="numeric" placeholder="Ex: 20" value="{{ (form.get('age') if form else '') | e }}" />
        </div>
        <div class="field">
          <label for="sexe">Sexe</label>
          <select id="sexe" name="sexe">
            {% set v = (form.get('sexe') if form else '') %}
            <option value="" {{ 'selected' if v == '' else '' }}>—</option>
            <option value="M" {{ 'selected' if v == 'M' else '' }}>Masculin</option>
            <option value="F" {{ 'selected' if v == 'F' else '' }}>Féminin</option>
          </select>
        </div>

        <div class="field">
          <label for="filiere">Filière</label>
          <input id="filiere" name="filiere" placeholder="Ex: Informatique" value="{{ (form.get('filiere') if form else '') | e }}" />
        </div>
        <div class="field">
          <label for="niveau">Niveau</label>
          <input id="niveau" name="niveau" placeholder="Ex: L2 / M1" value="{{ (form.get('niveau') if form else '') | e }}" />
        </div>

        <div class="field">
          <label for="telephone">Téléphone</label>
          <input id="telephone" name="telephone" placeholder="Ex: +227..." value="{{ (form.get('telephone') if form else '') | e }}" />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="Ex: nom@email.com" value="{{ (form.get('email') if form else '') | e }}" />
        </div>

        <div class="field">
          <label for="residence">Résidence</label>
          <input id="residence" name="residence" placeholder="Ex: Cité U / Quartier" value="{{ (form.get('residence') if form else '') | e }}" />
        </div>
        <div class="field">
          <label for="paroisse">Paroisse</label>
          <input id="paroisse" name="paroisse" placeholder="Ex: Saint..." value="{{ (form.get('paroisse') if form else '') | e }}" />
        </div>

        <div class="field field--full">
          <label for="groupe">Groupe / Mouvement</label>
          <input id="groupe" name="groupe" placeholder="Ex: Chorale, Aumônerie..." value="{{ (form.get('groupe') if form else '') | e }}" />
        </div>
      </div>

      <div class="actions">
        <button class="btn" type="submit">Enregistrer</button>
        <a class="btn btn--secondary" href="{{ url_for('liste') }}">Voir la liste</a>
      </div>
    </form>
  </section>
{% endblock %}
