services:
  - type: web
    name: recensement-uam
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: MANAGER_PASSWORD
        sync: false
      - key: FLASK_DEBUG
        value: "0"
